version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: webrtc-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  coturn:
    image: coturn/coturn:latest
    container_name: webrtc-coturn
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/udp"
      - "5349:5349/tcp"
      - "49152-49200:49152-49200/udp"
    environment:
      - TURN_PORT=3478
      - TURN_SECRET=webrtc-production-secret-key
      - REALM=webrtc.local
    restart: unless-stopped
